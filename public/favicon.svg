<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Solid App Background to prevent black square on PWA Splash -->
  <rect width="512" height="512" fill="#020B16" />

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="270" r="200" stroke="#3b82f6" stroke-width="4" stroke-opacity="0.25" fill="none"/>
  <circle cx="256" cy="270" r="175" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.12" fill="none"/>

  <!-- Antenna -->
  <line x1="256" y1="68" x2="256" y2="110" stroke="#60a5fa" stroke-width="10" stroke-linecap="round"/>
  <circle cx="256" cy="52" r="18" fill="#60a5fa" filter="url(#glow)"/>
  <circle cx="256" cy="52" r="10" fill="#bfdbfe"/>

  <!-- Bot body -->
  <rect x="96" y="112" width="320" height="270" rx="68" ry="68" fill="#0f1e3a" stroke="#3b82f6" stroke-width="6" stroke-opacity="0.6"/>

  <!-- Eye outer ring -->
  <circle cx="256" cy="234" r="72" fill="#060e1f" stroke="#3b82f6" stroke-width="4"/>
  <!-- Eye iris -->
  <circle cx="256" cy="234" r="48" fill="url(#eyeGrad)" filter="url(#glow)"/>
  <!-- Eye pupil -->
  <circle cx="256" cy="234" r="22" fill="#eff6ff"/>
  <!-- Eye inner detail -->
  <circle cx="256" cy="234" r="10" fill="#1e3a8a"/>
  <!-- Eye shine -->
  <circle cx="240" cy="218" r="9" fill="white" fill-opacity="0.55"/>
  <circle cx="248" cy="226" r="4" fill="white" fill-opacity="0.3"/>

  <!-- Mouth/Speaker bars -->
  <rect x="168" y="336" width="176" height="22" rx="11" fill="#1e40af" fill-opacity="0.5"/>
  <rect x="178" y="336" width="34" height="22" rx="11" fill="#60a5fa" fill-opacity="0.9"/>
  <rect x="222" y="336" width="34" height="22" rx="11" fill="#60a5fa" fill-opacity="0.9"/>
  <rect x="266" y="336" width="34" height="22" rx="11" fill="#60a5fa" fill-opacity="0.7"/>
  <rect x="310" y="336" width="22" height="22" rx="11" fill="#60a5fa" fill-opacity="0.5"/>

  <!-- Left ear port -->
  <rect x="60" y="188" width="36" height="80" rx="16" fill="#0d1f3c" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.5"/>
  <rect x="68" y="202" width="20" height="10" rx="5" fill="#3b82f6" fill-opacity="0.4"/>
  <rect x="68" y="222" width="20" height="10" rx="5" fill="#3b82f6" fill-opacity="0.4"/>
  <rect x="68" y="242" width="20" height="10" rx="5" fill="#3b82f6" fill-opacity="0.4"/>

  <!-- Right ear port -->
  <rect x="416" y="188" width="36" height="80" rx="16" fill="#0d1f3c" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.5"/>
  <rect x="424" y="202" width="20" height="10" rx="5" fill="#3b82f6" fill-opacity="0.4"/>
  <rect x="424" y="222" width="20" height="10" rx="5" fill="#3b82f6" fill-opacity="0.4"/>
  <rect x="424" y="242" width="20" height="10" rx="5" fill="#3b82f6" fill-opacity="0.4"/>

  <!-- Circuit lines left -->
  <line x1="108" y1="295" x2="148" y2="295" stroke="#3b82f6" stroke-width="4" stroke-opacity="0.5"/>
  <circle cx="104" cy="295" r="6" fill="#60a5fa" fill-opacity="0.6"/>

  <!-- Circuit lines right -->
  <line x1="364" y1="295" x2="404" y2="295" stroke="#3b82f6" stroke-width="4" stroke-opacity="0.5"/>
  <circle cx="408" cy="295" r="6" fill="#60a5fa" fill-opacity="0.6"/>
</svg>